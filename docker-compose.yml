services:
  postgres:
    image: postgres:17-alpine
    container_name: template_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - template_network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: template_keycloak
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start-dev
    volumes:
      - ./config/keycloak/data:/opt/keycloak/data/h2
    networks:
      - template_network

volumes:
  postgres_data:

networks:
  template_network:
    driver: bridge
